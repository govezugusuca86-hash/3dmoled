<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
<div id="header-root"></div>
<div class="page-header"><h1 class="container">🛒 Корзина</h1></div>

<section class="section">
  <div class="container" id="cart-root"></div>
</section>

<div id="footer-root"></div>
<script src="../js/products.js"></script>
<script src="../js/reviews.js"></script>
<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script>
document.getElementById('header-root').innerHTML = renderHeader({ root: '../' });
document.getElementById('footer-root').innerHTML = renderFooter({ root: '../' });
initLayout('../');

let isSubmitting = false; // защита от двойного клика

function render() {
  const items = Cart.get();
  const root = document.getElementById('cart-root');
  if (items.length === 0) {
    root.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><h3>Корзина пуста</h3><p>Добавьте товары из каталога</p><a href="../index.html" class="btn btn-primary">Перейти в каталог</a></div>`;
    return;
  }
  let total = 0, totalOld = 0;
  const itemsHtml = items.map(ci => {
    const p = products.find(p => p.id === ci.id);
    if (!p) return '';
    const sum = p.price * ci.qty;
    const sumOld = p.oldPrice * ci.qty;
    total += sum; totalOld += sumOld;
    return `<div class="cart-item" id="ci-${p.id}">
      <div class="cart-item-img"><a href="product.html?id=${p.id}"><img src="${p.photos[0]||''}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/80x80?text=?'"></a></div>
      <div class="cart-item-info">
        <div class="cart-item-name"><a href="product.html?id=${p.id}">${p.name}</a></div>
        <div class="cart-item-brand">${p.brand||''} ${p.technology||''}</div>
        <div style="margin-top:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
            <span class="qty-val">${ci.qty}</span>
            <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
          </div>
          <button class="cart-remove" onclick="removeItem('${p.id}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
        </div>
      </div>
      <div class="cart-item-price">${formatPrice(sum)}</div>
    </div>`;
  }).join('');

  const save = totalOld - total;
  root.innerHTML = `<div class="cart-layout">
    <div class="cart-items">${itemsHtml}</div>
    <div class="order-summary">
      <h3>Итого</h3>
      <div class="summary-row"><span>Товаров:</span><span>${items.reduce((s,i)=>s+i.qty,0)} шт.</span></div>
      ${save > 0 ? `<div class="summary-row"><span>Скидка:</span><span class="summary-save">−${formatPrice(save)}</span></div>` : ''}
      <div class="summary-row" style="padding-top:12px;margin-top:4px;border-top:1.5px solid var(--border)">
        <span class="summary-total">Итого:</span>
        <span class="summary-total">${formatPrice(total)}</span>
      </div>

      <button id="checkout-btn" class="btn-checkout" onclick="submitOrder()">
        <span id="checkout-btn-text">Оформить заказ</span>
      </button>
      <div id="checkout-error" class="checkout-error"></div>

      <div class="checkout-note">
        <strong>Мы не звоним клиентам.</strong> После нажатия мы зафиксируем заказ и покажем вам номер. Чтобы мы начали сборку — напишите нам в Telegram или MAX (кнопки появятся на следующем шаге).
      </div>

      <a href="../index.html" style="display:block;text-align:center;margin-top:14px;font-size:14px;color:var(--green)">← Продолжить покупки</a>
    </div>
  </div>`;
}

function changeQty(id, delta) {
  const items = Cart.get();
  const item = items.find(i => i.id === id);
  if (!item) return;
  const newQty = item.qty + delta;
  if (newQty <= 0) { Cart.remove(id); } else { Cart.setQty(id, newQty); }
  render();
}
function removeItem(id) { Cart.remove(id); render(); showToast('Товар удалён'); }

async function submitOrder() {
  if (isSubmitting) return;
  if (Cart.get().length === 0) return;

  isSubmitting = true;
  setTimeout(function () { isSubmitting = false; }, 10000); // 10 сек блокировка

  const btn = document.getElementById('checkout-btn');
  const btnText = document.getElementById('checkout-btn-text');
  const errBox = document.getElementById('checkout-error');

  btn.disabled = true;
  btn.classList.remove('btn-checkout--error');
  errBox.classList.remove('show');
  btnText.textContent = 'Оформляем…';

  // Метрика
  try { if (typeof ym === 'function') ym(109407985, 'reachGoal', 'order_submit'); } catch (e) {}

  try {
    const result = await Cart.submitOrder();
    // Сохраняем заказ для success-страницы
    sessionStorage.setItem('gg_last_order', JSON.stringify(result));
    Cart.clear();
    window.location.href = 'success.html';
  } catch (err) {
    console.error('Ошибка оформления:', err);
    btn.classList.add('btn-checkout--error');
    btnText.textContent = 'Попробовать ещё раз';
    btn.disabled = false;
    errBox.textContent = 'Не удалось оформить заказ. Проверьте интернет-соединение и попробуйте ещё раз. Если ошибка повторяется — напишите нам в Telegram, мы оформим заказ вручную.';
    errBox.classList.add('show');
    isSubmitting = false;
  }
}

render();
</script>
</body>
</html>
