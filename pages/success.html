</head>
<body>
<div id="header-root"></div>

<section class="section">
  <div class="container">
    <div class="success-wrap" id="success-root">
      <!-- Контент рендерится из JS -->
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../js/products.js"></script>
<script src="../js/reviews.js"></script>
<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script>
document.getElementById('header-root').innerHTML = renderHeader({ root: '../' });
document.getElementById('footer-root').innerHTML = renderFooter({ root: '../' });
initLayout('../');

(function () {
  const TG_URL  = window.TG_URL  || 'https://t.me/manager_3dxob';
  const MAX_URL = window.MAX_URL || 'https://max.ru/u/f9LHodD0cOLbPms83NhpLUuBMuNHSX0ACmj8j15deTMlhrJ55qC9Y1KHtdQ';
  const SITE    = '3dxob.ru';
  const root    = document.getElementById('success-root');

  let order;
  try { order = JSON.parse(sessionStorage.getItem('gg_last_order')); } catch (e) { order = null; }

  if (!order || !order.orderNumber) {
    root.innerHTML = `
      <h1 class="success-title">Заказ не найден</h1>
      <p style="color:var(--text-muted);margin-bottom:20px">Похоже, вы попали сюда напрямую. Если у вас уже есть номер заказа — напишите нам в Telegram или MAX, и мы продолжим оформление.</p>
      <div class="success-cta-row">
        <a class="success-cta-btn success-cta-btn--tg" href="${TG_URL}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
          Написать в Telegram
        </a>
        <a class="success-cta-btn success-cta-btn--max" href="${MAX_URL}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 4h4l5 7 5-7h4v16h-4V11l-5 7-5-7v9H3V4z"/></svg>
          Написать в MAX
        </a>
      </div>
      <a class="success-back" href="../index.html">← Вернуться в каталог</a>
    `;
    return;
  }

  // Метрика
  try { if (typeof ym === 'function') ym(109407985, 'reachGoal', 'order_success_view'); } catch (e) {}

  const items = order.items || [];
  const total = order.total || 0;

  // Текст для готового сообщения в мессенджер
  const itemsTextLines = items.map(i => `• ${i.name} × ${i.qty} = ${(i.price * i.qty).toLocaleString('ru-RU')} ₽`);
  const messageText = [
    `Здравствуйте! Я оформил заказ ${order.orderNumber} на сайте ${SITE}.`,
    '',
    'Состав:',
    ...itemsTextLines,
    '',
    `Итого: ${total.toLocaleString('ru-RU')} ₽`,
    '',
    'Подскажите, что дальше?'
  ].join('\n');
  const encodedMsg = encodeURIComponent(messageText);

  const tgHref  = TG_URL  + '?text=' + encodedMsg;
  const maxHref = MAX_URL + '?text=' + encodedMsg;

  const pendingWarning = order.isPending ? `
    <div class="success-warning">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:#92400e"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Сервер сейчас недоступен — мы присвоили заказу временный номер. <strong>Обязательно напишите нам в Telegram или MAX</strong>, чтобы мы зафиксировали его вручную.</span>
    </div>
  ` : '';

  const itemsListHtml = items.map(i => `
    <li>
      <div>
        <span class="success-summary-name">${escapeHtml(i.name)}</span>
        <span class="success-summary-qty">× ${i.qty}</span>
      </div>
      <span class="success-summary-price">${(i.price * i.qty).toLocaleString('ru-RU')} ₽</span>
    </li>
  `).join('');

  root.innerHTML = `
    <h1 class="success-title">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Заказ оформлен
    </h1>

    <div class="success-callout">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span><strong>Напишите нам номер заказа в Telegram или MAX</strong>, чтобы мы начали сборку. Сами мы не звоним — заказ подтверждается только после вашего сообщения.</span>
    </div>

    ${pendingWarning}

    <div class="success-order-card">
      <div>
        <div class="success-order-label">Номер заказа</div>
        <div class="success-order-number" id="order-number">${order.orderNumber}</div>
      </div>
      <button class="success-copy-btn" onclick="copyOrderNumber(this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span class="copy-label">Скопировать</span>
      </button>
    </div>

    <div class="success-cta-row">
      <a class="success-cta-btn success-cta-btn--tg" href="${tgHref}" target="_blank" rel="noopener" onclick="trackContact('tg')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
        Написать в Telegram
      </a>
      <a class="success-cta-btn success-cta-btn--max" href="${maxHref}" target="_blank" rel="noopener" onclick="trackContact('max')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 4h4l5 7 5-7h4v16h-4V11l-5 7-5-7v9H3V4z"/></svg>
        Написать в MAX
      </a>
    </div>

    <div class="success-summary">
      <h3>Состав заказа</h3>
      <ul class="success-summary-list">${itemsListHtml}</ul>
      <div class="success-summary-total">
        <span>Итого:</span>
        <span>${total.toLocaleString('ru-RU')} ₽</span>
      </div>
    </div>

    <a class="success-back" href="../index.html">← Вернуться в каталог</a>
  `;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }
})();

function copyOrderNumber(btn) {
  const num = document.getElementById('order-number').textContent.trim();
  const label = btn.querySelector('.copy-label');
  const setCopied = () => {
    btn.classList.add('copied');
    label.textContent = 'Скопировано';
    setTimeout(() => { btn.classList.remove('copied'); label.textContent = 'Скопировать'; }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(num).then(setCopied).catch(() => fallbackCopy(num, setCopied));
  } else {
    fallbackCopy(num, setCopied);
  }
}
function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); done(); } catch (e) {}
  document.body.removeChild(ta);
}
function trackContact(kind) {
  try { if (typeof ym === 'function') ym(109407985, 'reachGoal', kind === 'tg' ? 'contact_tg' : 'contact_max'); } catch (e) {}
}
</script>
</body>
</html>
