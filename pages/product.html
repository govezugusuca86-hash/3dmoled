<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Товар — 3DModled</title>
<meta name="description" content="Купить 3D принтер в интернет-магазине 3DModled">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="header-root"></div>

<div class="container" style="padding-top:12px">
  <div class="breadcrumb" id="breadcrumb">
    <a href="../index.html">Главная</a><span>/</span>
    <span id="bc-cat-link"><a href="../index.html">Каталог</a></span><span>/</span>
    <span id="bc-name">Товар</span>
  </div>
</div>

<section class="section" style="padding-top:16px">
  <div class="container" id="product-root">
    <div style="text-align:center;padding:60px"><div style="font-size:32px;margin-bottom:12px">⏳</div><p>Загрузка...</p></div>
  </div>
</section>

<!-- SIMILAR -->
<section class="section section-gray" id="similar-section" style="display:none">
  <div class="container">
    <div class="section-head">
      <h2 class="section-title">Похожие <span>товары</span></h2>
    </div>
    <div class="product-grid" id="similar-grid"></div>
  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-prev" onclick="lbNav(-1)">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lightbox-next" onclick="lbNav(1)">›</button>
</div>

<div id="footer-root"></div>

<script src="../js/products.js"></script>
<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script>
document.getElementById('header-root').innerHTML = renderHeader({ root: '../' });
document.getElementById('footer-root').innerHTML = renderFooter({ root: '../' });
initSearch('#header-search', '../');

const id = new URLSearchParams(location.search).get('id');
const product = products.find(p => p.id === id);

if (!product) {
  document.getElementById('product-root').innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><h3>Товар не найден</h3><p>Возможно, он был удалён или ссылка устарела</p><a href="../index.html" class="btn btn-primary">Вернуться в каталог</a></div>`;
} else {
  document.title = `${product.name} — 3DModled`;
  document.querySelector('meta[name="description"]').content = `Купить ${product.name} за ${product.price.toLocaleString('ru-RU')} ₽. ${product.description.slice(0,120)}`;
  
  // Breadcrumb
  document.getElementById('bc-cat-link').innerHTML = `<a href="../index.html?cat=${encodeURIComponent(product.category)}">${product.category}</a>`;
  document.getElementById('bc-name').textContent = product.name;

  const discount = product.discount > 0 ? `<span class="badge-discount" style="font-size:13px;padding:4px 10px">-${product.discount}%</span>` : '';
  const oldPrice = product.oldPrice > product.price ? `<span class="product-price-old">${formatPrice(product.oldPrice)}</span>` : '';
  const save = product.oldPrice > product.price ? `<span class="product-price-save">Экономия ${formatPrice(product.oldPrice - product.price)}</span>` : '';
  const thumbs = product.photos.map((ph, i) => 
    `<div class="gallery-thumb${i===0?' active':''}" onclick="setPhoto('${ph}',this)"><img src="${ph}" alt="" loading="lazy" onerror="this.src='https://via.placeholder.com/80x80?text=?'"></div>`
  ).join('');

  const specsRows = Object.entries(product.specs).map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');

  document.getElementById('product-root').innerHTML = `
<div class="product-layout">
  <div class="gallery">
    <div class="gallery-main" onclick="openLightbox(0)">
      <img id="main-photo" src="${product.photos[0] || 'https://via.placeholder.com/400x400?text=Нет+фото'}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x400?text=Нет+фото'">
    </div>
    <div class="gallery-thumbs">${thumbs}</div>
  </div>
  <div class="product-info">
    <div class="product-meta">
      ${product.brand ? `<span class="product-brand">${product.brand}</span>` : ''}
      ${product.technology ? `<span class="product-tech">${product.technology}</span>` : ''}
      ${discount}
    </div>
    <h1 class="product-info-title">${product.name}</h1>
    <div class="product-price-block">
      <div>
        <span class="product-price-current">${formatPrice(product.price)}</span>
        ${oldPrice}
      </div>
      ${save}
      <div class="product-stock">
        <div class="stock-dot${product.inStock ? '' : '" style="background:#ef4444'}"></div>
        <span>${product.inStock ? 'В наличии' : 'Нет в наличии'}</span>
      </div>
    </div>
    <div class="product-btns">
      <button class="btn-buy" onclick="addToCart('${product.id}',this)" id="buy-btn">
        🛒 Добавить в корзину
      </button>
      <button class="btn-fav-product${Favs.has(product.id)?' active':''}" id="fav-btn" onclick="toggleFavProduct()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="${Favs.has(product.id)?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>
    <a href="https://vk.com/3dmoled" target="_blank" style="display:block;text-align:center;padding:11px;border:1.5px solid #0077ff;color:#0077ff;border-radius:10px;font-size:14px;font-weight:500;margin-bottom:20px;transition:background .15s" onmouseover="this.style.background='#f0f7ff'" onmouseout="this.style.background=''">💬 Оформить заказ через ВКонтакте</a>
    <div class="product-delivery">
      <div class="delivery-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> Доставка по всей России — СДЭК, ПЭК</div>
      <div class="delivery-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Гарантия ${product.specs['Гарантия'] || '3–12 месяцев'}</div>
    </div>
  </div>
</div>

<div style="margin-top:36px">
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('desc',this)">Описание</button>
    <button class="tab-btn" onclick="showTab('specs',this)">Характеристики</button>
    <button class="tab-btn" onclick="showTab('delivery',this)">Доставка</button>
    <button class="tab-btn" onclick="showTab('guarantee',this)">Гарантия</button>
  </div>
  <div class="tab-content active" id="tab-desc">
    <p style="font-size:15px;line-height:1.8;color:var(--text-muted)">${product.description}</p>
  </div>
  <div class="tab-content" id="tab-specs">
    <table class="specs-table">${specsRows}</table>
  </div>
  <div class="tab-content" id="tab-delivery">
    <h3 style="margin-bottom:12px">Доставка</h3>
    <p>Доставляем по всей России курьерскими службами СДЭК и ПЭК. Сроки доставки: 2–14 дней в зависимости от региона.</p>
    <p>Самовывоз — уточняйте наличие через ВКонтакте.</p>
    <p><a href="../pages/delivery.html" style="color:var(--green)">Подробнее об условиях доставки →</a></p>
  </div>
  <div class="tab-content" id="tab-guarantee">
    <h3 style="margin-bottom:12px">Гарантия и возврат</h3>
    <p>На данный товар предоставляется гарантия: <strong>${product.specs['Гарантия'] || '3 месяца'}</strong>.</p>
    <p>Возврат товара надлежащего качества в течение 14 дней с момента получения при сохранении товарного вида.</p>
    <p><a href="../pages/guarantee.html" style="color:var(--green)">Подробнее об условиях гарантии →</a></p>
  </div>
</div>`;

  // Similar products
  const similar = products.filter(p => p.id !== product.id && p.category === product.category).sort(() => Math.random() - .5).slice(0,4);
  if (similar.length > 0) {
    document.getElementById('similar-section').style.display = '';
    document.getElementById('similar-grid').innerHTML = similar.map(p => productCard(p, { root: '../' })).join('');
  }
}

// Gallery
function setPhoto(src, thumb) {
  document.getElementById('main-photo').src = src;
  document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
  if (thumb) thumb.classList.add('active');
}

// Lightbox
let lbPhotos = product ? product.photos : [];
let lbIdx = 0;
function openLightbox(i) {
  lbIdx = i;
  document.getElementById('lightbox-img').src = lbPhotos[i];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function lbNav(dir) {
  lbIdx = (lbIdx + dir + lbPhotos.length) % lbPhotos.length;
  document.getElementById('lightbox-img').src = lbPhotos[lbIdx];
}
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowRight') lbNav(1); if (e.key === 'ArrowLeft') lbNav(-1); });

// Tabs
function showTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// Fav button
function toggleFavProduct() {
  if (!product) return;
  const active = Favs.toggle(product.id);
  const btn = document.getElementById('fav-btn');
  btn.classList.toggle('active', active);
  const svg = btn.querySelector('svg');
  if (svg) svg.setAttribute('fill', active ? 'currentColor' : 'none');
}
</script>
</body>
</html>
