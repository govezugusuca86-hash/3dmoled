<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DMoled — Интернет-магазин 3D принтеров</title>
<meta name="description" content="Купить 3D принтер в интернет-магазине 3DMoled. Широкий выбор: Bambu Lab, Creality, Elegoo, Anycubic. Доставка по всей России. Гарантия.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">
<!-- Yandex.Metrika counter -->

ym(108699019,"init",{ssr:true,webvisor:true,clickmap:true,ecommerce:"dataLayer",referrer:document.referrer,url:location.href,accurateTrackBounce:true,trackLinks:true});

</head>
<body>
<div id="header-root"></div>

<!-- BANNER -->
<section class="banner-section">
  <a href="#catalog">
    <img src="img/banner.jpg" alt="3DMoled — Магазин 3D принтеров. В наличии. Доставка. Гарантия." class="banner-img">
  </a>
</section>

<!-- BRANDS -->
<section class="section section-gray">
  <div class="container">
    <div class="section-head">
      <h2 class="section-title">Популярные <span>бренды</span></h2>
    </div>
    <div class="brands-grid" id="brands-grid"></div>
  </div>
</section>

<!-- TOP SALES -->
<section class="section">
  <div class="container">
    <div class="section-head">
      <h2 class="section-title">Топ <span>продаж</span></h2>
      <a href="#catalog" class="link-more">Смотреть все</a>
    </div>
    <div class="product-grid" id="hits-grid"></div>
  </div>
</section>

<!-- CATALOG -->
<section class="section" id="catalog">
  <div class="container">
    <div class="section-head">
      <h2 class="section-title" id="catalog-heading">Весь <span>каталог</span></h2>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button id="filter-toggle" style="display:none;border:1.5px solid var(--border-dark);background:#fff;border-radius:6px;padding:8px 14px;font-size:14px;cursor:pointer">⚙️ Фильтры</button>
        <select class="sort-select" id="sort-select">
          <option value="popular">По популярности</option>
          <option value="price-asc">Цена: дешевле</option>
          <option value="price-desc">Цена: дороже</option>
          <option value="discount">По скидке</option>
        </select>
      </div>
    </div>
    <div class="catalog-layout">
      <aside class="filters" id="filters">
        <div class="filter-title">Фильтры <span class="filter-reset" onclick="resetFilters()">Сбросить</span></div>
        <div class="filter-group">
          <div class="filter-group-title">Бренд</div>
          <div id="brand-filters"></div>
        </div>
        <div class="filter-group">
          <div class="filter-group-title">Цена, ₽</div>
          <div class="price-range">
            <input type="text" inputmode="numeric" id="price-min" placeholder="От">
            <input type="text" inputmode="numeric" id="price-max" placeholder="До">
          </div>
          <button onclick="applyFilters()" style="margin-top:10px;width:100%;background:var(--green);color:#fff;border:none;border-radius:6px;padding:9px;font-size:14px;cursor:pointer">Применить</button>
        </div>
        <div class="filter-group">
          <label class="filter-check"><input type="checkbox" id="filter-sale"> Только со скидкой</label>
          <label class="filter-check" style="margin-top:6px"><input type="checkbox" id="filter-stock" checked> Только в наличии</label>
        </div>
      </aside>
      <div>
        <div class="sort-bar">
          <div class="sort-bar-left">Найдено: <strong id="count-label">0</strong> товаров</div>
        </div>
        <div class="product-grid" id="catalog-grid"></div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</section>

<div id="footer-root"></div>

<script src="js/products.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
document.getElementById('header-root').innerHTML = renderHeader({ page: 'home' });
document.getElementById('footer-root').innerHTML = renderFooter({});
initSearch('#header-search', '');

const PAGE_SIZE = 24;
let currentPage = 1;
let filtered = [];

// Parse URL params
const urlParams = new URLSearchParams(location.search);
const urlCat = urlParams.get('cat') || '';
const urlQ = urlParams.get('q') || '';
const urlSort = urlParams.get('sort') || '';

if (urlQ) document.querySelector('#header-search').value = urlQ;
if (urlSort === 'discount') document.getElementById('sort-select').value = 'discount';

// Build brand filter checkboxes
function buildSideFilters() {
  const brands = [...new Set(products.map(p => p.brand).filter(Boolean))].sort();
  document.getElementById('brand-filters').innerHTML = brands.map(b =>
    `<label class="filter-check"><input type="checkbox" class="brand-cb" value="${b}"> ${b}</label>`
  ).join('');
}

function getFilters() {
  const brands = [...document.querySelectorAll('.brand-cb:checked')].map(el => el.value);
  const priceMin = parseInt(document.getElementById('price-min').value) || 0;
  const priceMax = parseInt(document.getElementById('price-max').value) || Infinity;
  const onlySale = document.getElementById('filter-sale').checked;
  const onlyStock = document.getElementById('filter-stock').checked;
  const sort = document.getElementById('sort-select').value;
  const cat = urlCat;
  const q = urlQ;
  return { cat, brands, priceMin, priceMax, onlySale, onlyStock, sort, q };
}

function applyFilters() {
  const f = getFilters();
  filtered = products.filter(p => {
    if (f.onlyStock && !p.inStock) return false;
    if (f.cat && p.category !== f.cat) return false;
    if (f.brands.length && !f.brands.includes(p.brand)) return false;
    if (p.price < f.priceMin || p.price > f.priceMax) return false;
    if (f.onlySale && p.discount <= 0) return false;
    if (f.q) {
      const q = f.q.toLowerCase();
      if (!p.name.toLowerCase().includes(q) && !(p.brand||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
  if (f.sort === 'price-asc') filtered.sort((a,b) => a.price - b.price);
  else if (f.sort === 'price-desc') filtered.sort((a,b) => b.price - a.price);
  else if (f.sort === 'discount') filtered.sort((a,b) => b.discount - a.discount);
  currentPage = 1;
  render();
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const grid = document.getElementById('catalog-grid');
  document.getElementById('count-label').textContent = filtered.length;
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><h3>Ничего не найдено</h3><p>Попробуйте изменить фильтры или поисковый запрос</p><button class="btn btn-primary" onclick="resetFilters()">Сбросить фильтры</button></div>`;
  } else {
    grid.innerHTML = page.map(p => productCard(p, { root: '' })).join('');
  }
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || Math.abs(i - currentPage) <= 2)
      html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i - currentPage) === 3)
      html += `<span style="padding:0 4px;line-height:38px">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(n) {
  currentPage = n;
  render();
  document.getElementById('catalog').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetFilters() {
  document.querySelectorAll('.brand-cb').forEach(cb => cb.checked = false);
  document.getElementById('price-min').value = '';
  document.getElementById('price-max').value = '';
  document.getElementById('filter-sale').checked = false;
  document.getElementById('filter-stock').checked = true;
  applyFilters();
}

// Top sales — P1S, P2S, A1, A1 Combo
function renderHits() {
  const topIds = ['47170', '56507', '51972', '51574'];
  const hits = topIds.map(id => products.find(p => p.id === id)).filter(Boolean);
  document.getElementById('hits-grid').innerHTML = hits.map(p => productCard(p, { root: '' })).join('');
}

// Brands block
function renderBrands() {
  const brandIcons = {
    'Bambu Lab': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h2l1 3 2-5 1 3h2"/></svg>',
    'Creality': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 22 8 22 16 12 22 2 16 2 8"/><polyline points="12 2 12 22"/><line x1="2" y1="8" x2="22" y2="8"/><line x1="2" y1="16" x2="22" y2="16"/></svg>',
    'Elegoo': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3.6 9h16.8M3.6 15h16.8"/><path d="M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>',
    'Anycubic': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
    'Flashforge': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>'
  };
  const brandCounts = {};
  products.forEach(p => { if(p.brand) brandCounts[p.brand] = (brandCounts[p.brand]||0)+1; });
  const html = Object.entries(brandCounts).map(([name, count]) => `
    <a href="index.html?brand=${encodeURIComponent(name)}" class="brand-card" onclick="filterByBrand('${name}');return false;">
      <div class="brand-card-icon">${brandIcons[name]||''}</div>
      <div>
        <div class="brand-card-name">${name}</div>
        <div class="brand-card-count">${count} товаров</div>
      </div>
    </a>`).join('');
  document.getElementById('brands-grid').innerHTML = html;
}

function filterByBrand(brand) {
  document.getElementById('catalog').scrollIntoView({behavior:'smooth'});
  setTimeout(() => {
    document.querySelectorAll('.brand-cb').forEach(cb => { cb.checked = cb.value === brand; });
    applyFilters();
  }, 400);
}

// Filter toggle mobile
document.getElementById('filter-toggle').addEventListener('click', () => {
  document.getElementById('filters').classList.toggle('open');
});

// Listen changes
document.querySelectorAll('input[name="cat"]').forEach(el => el.addEventListener('change', applyFilters));
document.getElementById('sort-select').addEventListener('change', applyFilters);

// Heading
if (urlCat) {
  const names = { '3D принтеры персональные': '3D <span style="color:var(--green)">Принтеры</span>', 'Для 3D принтеров': 'Аксессуары и <span style="color:var(--green)">расходники</span>' };
  if (names[urlCat]) document.getElementById('catalog-heading').innerHTML = names[urlCat];
}
if (urlQ) document.getElementById('catalog-heading').innerHTML = `Поиск: <span style="color:var(--green)">${urlQ}</span>`;

// Init
buildSideFilters();
renderBrands();
renderHits();
applyFilters();

// Mobile filter btn
if (window.innerWidth <= 768) document.getElementById('filter-toggle').style.display = 'block';
</script>
</body>
</html>
